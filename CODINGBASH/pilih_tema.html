<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pilih Petualanganmu!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

    body {
      font-family: 'Fredoka', cursive;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ========== HALAMAN 1: GURU PAGE ========== */
    #page-guru {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f5f0e8;
      position: relative;
      overflow: hidden;
    }

    /* Langit */
    #page-guru::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(180deg, #d6eaf8 0%, #f5f0e8 100%);
      z-index: 0;
    }

    /* Rumput */
    #page-guru::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38%;
      background: radial-gradient(ellipse at 50% 100%, #4caf50 0%, #388e3c 60%, #2e7d32 100%);
      border-radius: 50% 50% 0 0 / 20% 20% 0 0;
      z-index: 0;
    }

    .guru-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      margin-top: -60px;
    }

    /* Awan kiri atas */
    .cloud-left {
      position: absolute;
      top: 30px;
      left: 40px;
      z-index: 5;
      font-size: 80px;
      opacity: 0.9;
      animation: floatCloud 6s ease-in-out infinite;
    }

    /* Pelangi kanan atas */
    .rainbow {
      position: absolute;
      top: 20px;
      right: 60px;
      z-index: 5;
      font-size: 90px;
      animation: floatCloud 7s ease-in-out infinite reverse;
    }

    /* Lebah */
    .bee {
      position: absolute;
      top: 160px;
      left: 200px;
      z-index: 5;
      font-size: 56px;
      animation: floatBee 3s ease-in-out infinite;
    }

    /* Ayunan (kiri bawah) */
    .swing {
      position: absolute;
      bottom: 60px;
      left: 40px;
      z-index: 6;
      font-size: 120px;
    }

    /* Robot (kanan bawah) */
    .robot {
      position: absolute;
      bottom: 50px;
      right: 60px;
      z-index: 6;
      font-size: 100px;
      animation: floatRobot 4s ease-in-out infinite;
    }

    /* Judul */
    .guru-title {
      text-align: center;
      color: #e67e22;
      font-size: 48px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0px rgba(0,0,0,0.1);
      line-height: 1.2;
    }

    /* Tombol */
    .btn-row {
      display: flex;
      gap: 32px;
      margin-top: 10px;
    }

    .btn-adab {
      background: #7dc95e;
      color: white;
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      border-radius: 50px;
      padding: 20px 70px;
      cursor: pointer;
      box-shadow: 0 6px 0 #4caf50;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-adab:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #4caf50;
    }

    .btn-adab:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #4caf50;
    }

    .btn-fun {
      background: #2c3e9e;
      color: white;
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      border-radius: 50px;
      padding: 20px 70px;
      cursor: pointer;
      box-shadow: 0 6px 0 #1a2472;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-fun:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #1a2472;
    }

    .btn-fun:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #1a2472;
    }

    /* ========== ANIMASI ========== */
    @keyframes floatCloud {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    @keyframes floatBee {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    @keyframes floatRobot {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-10px) rotate(3deg); }
    }

    /* Bintang di rumput */
    .grass-flowers {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 7;
      display: flex;
      gap: 40px;
      font-size: 20px;
    }

    /* ========== HALAMAN 2: ADAB ========== */
    #page-adab {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      position: relative;
    }

    /* ========== HALAMAN 3: FUN ========== */
    #page-fun {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      position: relative;
    }

    /* Kartu halaman 2 & 3 */
    .page-card {
      background: white;
      border-radius: 32px;
      padding: 50px 60px;
      text-align: center;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }

    .page-icon { font-size: 80px; margin-bottom: 16px; }

    .page-title {
      font-size: 36px;
      font-weight: 900;
      color: #2c3e50;
      margin-bottom: 12px;
    }

    .page-desc {
      font-size: 18px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .btn-back {
      background: #e74c3c;
      color: white;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      padding: 14px 40px;
      cursor: pointer;
      box-shadow: 0 5px 0 #c0392b;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-back:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #c0392b; }
    .btn-back:active { transform: translateY(3px); box-shadow: 0 2px 0 #c0392b; }

    .deco-top { position: absolute; top: 30px; font-size: 50px; animation: floatCloud 5s ease-in-out infinite; }
    .deco-bottom { position: absolute; bottom: 30px; font-size: 50px; animation: floatBee 4s ease-in-out infinite; }

    /* Transisi */
    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- ===== HALAMAN GURU (Halaman 1) ===== -->
  <div id="page-guru">
    <!-- Dekorasi -->
    <div class="cloud-left">☁️</div>
    <div class="rainbow">🌈</div>
    <div class="bee">🐝</div>
    <div class="swing">🛝</div>
    <div class="robot">🤖</div>
    <div class="grass-flowers">🌸 🌼 🌸 🌼 🌸 🌼 🌸</div>

    <!-- Konten Utama -->
    <div class="guru-content">
      <div class="guru-title">Pilih Petualanganmu<br>Hari Ini!</div>
      <div class="btn-row">
        <button class="btn-adab" onclick="location.href='soal_adab_1.1.html'">ADAB</button>
        <button class="btn-fun" onclick="location.href='soal_fun1.html'">FUN</button>
      </div>
    </div>
  </div>

  <!-- ===== HALAMAN ADAB (Halaman 2) ===== -->
  <div id="page-adab">
    <div class="deco-top">✨</div>
    <div class="page-card fade-in" onclick="location.href='soal_adab_1.1.html'" style="cursor: pointer;">
      <div class="page-icon">📖</div>
      <div class="page-title">Petualangan Adab!</div>
      <div class="page-desc">
        Yuk belajar adab yang baik! 🌟<br>
        (Klik kotak ini untuk mulai petualangan!)
      </div>
      <button class="btn-adab" onclick="location.href='soal_adab_1.1.html'">ADAB</button>
    </div>
    <div class="deco-bottom">🌺</div>
</div>

  <!-- ===== HALAMAN FUN (Halaman 3) ===== -->
  <div id="page-fun">
    <div class="deco-top">🎉</div>
    <div class="page-card fade-in" onclick="location.href='soal_CP_fun2.1.html'" style="cursor: pointer;">
      <div class="page-icon">🎮</div>
      <div class="page-title">Petualangan Fun!</div>
      <div class="page-desc">
        Waktunya bersenang-senang! 🎊<br>
        Main game seru, puzzle, dan tantangan menyenangkan.<br>
        Siap-siap untuk petualangan yang luar biasa!
      </div>
      <button class="btn-back" onclick="showPage('guru')">⬅️ Kembali</button>
    </div>
    <div class="deco-bottom">🦄</div>
  </div>
  <button class="btn-pilih" onclick="window.location.href='soal_CP_fun2.1.html'">Mulai Petualangan!</button>

  <script>
  // Ambil data pemain dari memori browser
  const player = JSON.parse(localStorage.getItem('playerAktif'));

  if (player) {
    // Jika kamu punya elemen dengan id 'sapaan', kita ganti teksnya
    const sapaan = document.getElementById('sapaanUser'); 
    if (sapaan) {
      sapaan.textContent = "Halo " + player.name + "!";
    }
    
    // Kamu juga bisa ganti warna tema halaman sesuai warna karakter
    // document.body.style.backgroundColor = player.color + "22"; // 22 itu kode transparan
  }

 function pilihTema(namaTema) {
    if (namaTema === 'fun') {
        window.location.href = "soal_CP_fun2.1.html";
    } else if (namaTema === 'adab') {
        // Pastikan nama file ini sesuai dengan file soal adab pertama kamu
        window.location.href = "soal_adab_1.1.html"; 
    }
}
</script>

</body>
</html>
