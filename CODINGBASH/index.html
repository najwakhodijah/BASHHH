<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOSH! Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Fredoka One', cursive;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ===== HALAMAN 1: START ===== */
    #page-start {
      position: relative;
      width: 100%;
      height: 100%;
      background: #f5f0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.6s ease;
    }

    /* SKY */
    .sky {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 80%;
      background: linear-gradient(180deg, #c8e8f7 0%, #e8f4fc 60%, #f5f0e0 100%);
      z-index: 0;
    }

    /* CLOUDS */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.92;
      filter: drop-shadow(0 4px 10px rgba(160,200,230,0.4));
      animation: floatCloud linear infinite;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud-1 {
      width: 210px; height: 62px;
      top: 8%; left: -230px;
      animation-duration: 28s;
    }
    .cloud-1::before { width: 95px; height: 95px; top: -48px; left: 18px; }
    .cloud-1::after  { width: 72px; height: 72px; top: -36px; left: 85px; }
    .cloud-2 {
      width: 180px; height: 52px;
      top: 16%; left: -200px;
      animation-duration: 35s;
      animation-delay: -14s;
    }
    .cloud-2::before { width: 78px; height: 78px; top: -40px; left: 22px; }
    .cloud-2::after  { width: 62px; height: 62px; top: -30px; left: 78px; }
    .cloud-3 {
      width: 160px; height: 48px;
      top: 5%; left: -180px;
      animation-duration: 40s;
      animation-delay: -22s;
    }
    .cloud-3::before { width: 70px; height: 70px; top: -35px; left: 20px; }
    .cloud-3::after  { width: 55px; height: 55px; top: -25px; left: 70px; }
    @keyframes floatCloud {
      from { transform: translateX(0); }
      to   { transform: translateX(115vw); }
    }

    /* SUN */
    .sun {
      position: absolute;
      top: 4%; right: 7%;
      width: 95px; height: 95px;
      z-index: 2;
      animation: sunBob 3.5s ease-in-out infinite;
    }
    .sun-circle {
      width: 66px; height: 66px;
      background: radial-gradient(circle at 38% 38%, #fff176, #ffd600);
      border-radius: 50%;
      position: absolute;
      top: 14px; left: 14px;
      box-shadow: 0 0 22px #ffe06688;
    }
    .sun-face {
      position: absolute;
      top: 14px; left: 14px;
      width: 66px; height: 66px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; z-index: 1;
    }
    .sun-rays { position: absolute; top: 0; left: 0; width: 95px; height: 95px; }
    .ray {
      position: absolute;
      width: 8px; height: 22px;
      background: #ffd600;
      border-radius: 4px;
      left: calc(50% - 4px);
      top: 0;
      transform-origin: 50% 47px;
    }
    @keyframes sunBob {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }

    /* GROUND AREA */
    .ground-area {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 22%;
      z-index: 3;
    }
    .grass-bg {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg, #8bc34a 0%, #558b2f 100%);
    }

    /* FENCE */
    .fence-rails {
      position: absolute;
      top: 0; left: 0;
      width: 100%; z-index: 2;
    }
    .fence-rail {
      position: absolute;
      left: 0; width: 100%;
      height: 11px;
      background: linear-gradient(180deg, #fafafa, #e0d8c0);
      border-top: 2px solid #ccc;
      border-bottom: 2px solid #bbb;
    }
    .fence-rail.top    { top: 14px; }
    .fence-rail.middle { top: 40px; }

    /* FLOWERS */
    .flowers-row {
      position: absolute;
      bottom: 100%;
      left: 0; width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      padding: 0 20px;
      z-index: 10;
      pointer-events: none;
    }
    .flower {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .flower:nth-child(odd)  { animation: sway1 2.2s ease-in-out infinite; }
    .flower:nth-child(even) { animation: sway2 2.8s ease-in-out infinite; }
    .fh { font-size: clamp(28px, 3.5vw, 46px); line-height: 1; }
    .fs {
      width: 4px;
      background: linear-gradient(180deg, #66bb6a, #388e3c);
      border-radius: 3px;
    }
    @keyframes sway1 {
      0%,100% { transform: rotate(-4deg) translateX(-1px); }
      50%      { transform: rotate(4deg) translateX(1px); }
    }
    @keyframes sway2 {
      0%,100% { transform: rotate(4deg) translateX(1px); }
      50%      { transform: rotate(-4deg) translateX(-1px); }
    }

    /* LOGO */
    .logo-container {
      position: relative;
      z-index: 10;
      margin-bottom: 32px;
      animation: logoPop 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .logo-img {
      width: clamp(280px, 38vw, 460px);
      height: auto;
      filter: drop-shadow(0 6px 20px rgba(50,30,120,0.2));
    }
    @keyframes logoPop {
      from { transform: scale(0.4) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* START BUTTON */
    .btn-start-wrap {
      position: relative;
      z-index: 10;
      animation: fadeUp 0.7s 0.4s both;
    }
    .btn-start {
      position: relative;
      background: linear-gradient(180deg, #2233dd, #1a1acc);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(20px, 2.5vw, 28px);
      letter-spacing: 5px;
      padding: 15px 90px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 7px 0 #0c0c88, 0 12px 24px rgba(26,26,200,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-start:hover  { transform: translateY(-3px); box-shadow: 0 10px 0 #0c0c88, 0 16px 28px rgba(26,26,200,0.4); }
    .btn-start:active { transform: translateY(5px);  box-shadow: 0 2px 0 #0c0c88; }
    .star-l, .star-r {
      position: absolute;
      font-size: clamp(24px, 3vw, 34px);
      top: 50%; transform: translateY(-50%);
      animation: starBounce 1.8s ease-in-out infinite;
    }
    .star-l { left: -30px; }
    .star-r { right: -30px; animation-delay: -0.9s; }
    @keyframes starBounce {
      0%,100% { transform: translateY(-50%) scale(1); }
      50%      { transform: translateY(-60%) scale(1.25); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== HALAMAN 2 ===== */
    #page-next {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #fffde7, #e8f5e9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 20;
    }
    #page-next.active { opacity: 1; pointer-events: all; }
    #page-start.hidden { opacity: 0; pointer-events: none; }

    .next-emoji { font-size: clamp(60px, 10vw, 100px); animation: logoPop 0.7s both; }
    .next-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(30px, 5vw, 58px);
      color: #1a1acc;
      margin: 12px 0 8px;
      animation: fadeUp 0.6s 0.2s both;
    }
    .next-sub {
      font-size: clamp(16px, 2vw, 24px);
      color: #555;
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.35s both;
    }
    .btn-back {
      background: #ff6b35;
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(18px, 2vw, 24px);
      letter-spacing: 2px;
      padding: 13px 55px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #bf360c;
      transition: transform 0.1s, box-shadow 0.1s;
      animation: fadeUp 0.6s 0.5s both;
    }
    .btn-back:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #bf360c; }
    .btn-back:active { transform: translateY(3px);  box-shadow: 0 2px 0 #bf360c; }

    .confetti-piece {
      position: absolute;
      border-radius: 2px;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity:1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity:0; }
    }
  </style>
</head>

<script>
  // --- BAGIAN VISUAL (JANGAN DIHAPUS) ---
  
  // Sun rays
  const sr = document.getElementById('sunRays');
  for (let i = 0; i < 8; i++) {
    const r = document.createElement('div');
    r.className = 'ray';
    r.style.transform = `rotate(${i*45}deg)`;
    sr.appendChild(r);
  }

  // Fence posts (Pagar)
  const fp = document.getElementById('fencePosts');
  const n = Math.ceil(window.innerWidth / 32) + 2;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;bottom:0;left:${i*32}px;width:18px;height:82px;background:linear-gradient(180deg,#fafafa,#ddd5b8);border:1.5px solid #ccc;border-radius:3px 3px 0 0;`;
    const tip = document.createElement('div');
    tip.style.cssText = `position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:10px solid #ccc;`;
    p.appendChild(tip);
    fp.appendChild(p);
  }

  // Flowers (Bunga)
  const flowerDefs = [
    {e:'🌻', h:80}, {e:'🌼', h:65}, {e:'🌻', h:95}, {e:'🌼', h:72},
    {e:'🌻', h:88}, {e:'🌻', h:70}, {e:'🌼', h:82}, {e:'🌻', h:78},
    {e:'🌼', h:90}, {e:'🌻', h:68}, {e:'🌻', h:85},
  ];
  const fr = document.getElementById('flowersRow');
  flowerDefs.forEach(f => {
    const div = document.createElement('div');
    div.className = 'flower';
    div.innerHTML = `<div class="fh">${f.e}</div><div class="fs" style="height:${f.h}px"></div>`;
    fr.appendChild(div);
  });

  // --- BAGIAN NAVIGASI DI start.html ---
  const btnStart = document.getElementById('btnStart');

  if (btnStart) {
    btnStart.addEventListener('click', () => {
      // TAMBAHKAN BARIS INI: Reset skor jadi 0 sebelum main
      localStorage.setItem('totalBintang', 0); 
      
      btnStart.style.transform = 'scale(0.95)';
      setTimeout(() => {
        window.location.href = 'password.html';
      }, 150);
    });
  }
</script>
