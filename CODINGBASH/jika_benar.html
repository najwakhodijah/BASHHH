<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yey! Kamu Berhasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #f9b224; /* Latar dasar orange */
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
        }

        /* Bingkai Utama menggunakan sparkle.png */
        .main-container {
            width: 100vw;
            height: 100vh;
            background-image: url('assets/images/sparkle.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Area Konten di dalam Bingkai */
        .content-area {
            position: relative;
            width: 85%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Aset 4.png (Blob Burgundy) */
        .blob-bg {
            position: absolute;
            width: 90%;
            height: auto;
            z-index: 1;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Teks digeser lebih ke tengah */
        .text-container {
            position: relative;
            z-index: 2;
            color: white;
            text-align: left;
            margin-right: 15%; /* Memberi ruang untuk bintang di kanan */
            margin-top: 7%;
            text-shadow: 3px 5px 15px rgba(0,0,0,0.3);
        }

        .text-container h1 { 
            font-size: clamp(80px, 10vw, 150px); 
            margin: 0; 
            line-height: 0.8;
        }
        .text-container p { 
            font-size: clamp(40px, 6vw, 90px); 
            margin: 0; 
            font-weight: 400;
        }

        /* Aset 3.png (Bintang) - Dibuat Lebih Besar */
        .star-character {
            position: absolute;
            width: 60%; /* Ukuran diperbesar */
            top: -10%;
            right: -8%;
            z-index: 3;
            filter: drop-shadow(5px 10px 15px rgba(0,0,0,0.2));
        }
        .footer-btn {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .btn-lanjut {
            background-color: white;
            color: #f9b224;
            padding: 15px 45px;
            border-radius: 50px;
            border: none;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #d99100;
            font-family: 'Fredoka', sans-serif;
    
        }

        .btn-lanjut:active {
            transform: translateX(0);
            box-shadow: 0 2px 0 #d99100;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="content-area">
            <img src="assets/images/4.png" class="blob-bg" alt="4.png">

            <div class="text-container">
                <h1>Yey!</h1>
                <p>Kamu berhasil</p>
            </div>

            <img src="assets/images/bintang2 (1).png" class="star-character" alt="bintang2 (1).png">

            <div class="footer-btn">
                <button class="btn-lanjut" onclick="pindahSoal()">
                    Lanjut ke soal selanjutnya ➔
                </button>
            </div>
        </div>
    </div>
    <audio id="audioBerhasil" src="assets/audio/yey berhasil.mp3"></audio>

    <script>
    // 1. Ambil data tujuan dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const lanjutKe = urlParams.get('lanjut');   

    window.onload = function() {
        // 2. Putar suara berhasil (pastikan ID-nya sama dengan tag audio di atas)
        const suara = document.getElementById('audioBerhasil');
        if (suara) {
            suara.play().catch(function(error) {
                console.log("Autoplay diblokir browser");
            });
        }
    };

    function pindahSoal() {
        // 3. Pindah ke soal selanjutnya atau balik ke menu
        if (lanjutKe) {
            window.location.href = lanjutKe;
        } else {
            window.location.href = "pilih_tema.html";
        }
    }
</script>

</body>
</html>
