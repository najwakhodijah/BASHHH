<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOSH! - Game Anak</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ===================== HALAMAN 1 - MENU UTAMA ===================== */
    #page-menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      width: 100vw;
      background-color: #f5f0e4;
      position: relative;
      overflow: hidden;
    }

    /* Clouds */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.7;
      animation: floatCloud 18s linear infinite;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud-1 { width: 120px; height: 40px; top: 6%; left: -140px; animation-duration: 22s; }
    .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
    .cloud-1::after  { width: 40px; height: 40px; top: -20px; left: 55px; }
    .cloud-2 { width: 90px; height: 30px; top: 14%; left: -110px; animation-duration: 28s; animation-delay: -10s; }
    .cloud-2::before { width: 45px; height: 45px; top: -22px; left: 10px; }
    .cloud-2::after  { width: 30px; height: 30px; top: -15px; left: 42px; }

    @keyframes floatCloud {
      from { left: -200px; }
      to   { left: 110vw; }
    }

    /* Logo */
    .logo-wrap {
      margin-top: 20px;
      width: 340px;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoBounce 2.5s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    /* Fallback teks logo jika gambar tidak ditemukan */
    .logo-fallback {
      font-size: 80px;
      font-weight: 900;
      color: #3b3b9c;
      letter-spacing: -4px;
      display: none;
    }

    @keyframes logoBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }

    /* Tombol area */
    .btn-area {
      display: flex;
      gap: 50px;
      margin-top: 10px;
      margin-bottom: 220px;
      position: relative;
      z-index: 2;
    }

    .btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .icon-top {
      font-size: 34px;
      position: absolute;
      top: -16px;
      right: -14px;
      z-index: 5;
      animation: iconBounce 1.8s ease-in-out infinite;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
      pointer-events: none;
    }
    .icon-top.butterfly { animation-delay: 0.4s; }

    @keyframes iconBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-8px) rotate(5deg); }
    }

    .btn-main {
      background: #2c2cb8;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 800;
      padding: 12px 45px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #1a1a88, 0 10px 16px rgba(44,44,184,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
      position: relative;
    }
    .btn-main:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 0 #1a1a88, 0 16px 25px rgba(44,44,184,0.45);
      background: #3535d0;
    }
    .btn-main:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #1a1a88, 0 6px 12px rgba(44,44,184,0.3);
    }

    /* Ripple effect on click */
    .btn-main::after {
      content: '';
      position: absolute;
      width: 0; height: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s, opacity 0.4s;
      opacity: 0;
      pointer-events: none;
    }
    .btn-main:active::after {
      width: 200px; height: 200px;
      opacity: 1;
    }

    /* ===== FENCE & FLOWERS ===== */
    .garden {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200px;
      z-index: 1;
    }

    /* Grass strip */
    .grass-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: linear-gradient(to bottom, #5ecc3c 0%, #3ea820 60%, #2d8a12 100%);
      border-radius: 30px 30px 0 0;
    }

    /* Grass blades */
    .grass-blades {
      position: absolute;
      bottom: 80px;
      width: 100%;
      display: flex;
      gap: 4px;
      padding: 0 5px;
      flex-wrap: wrap;
    }
    .blade {
      width: 8px;
      height: 30px;
      background: #4dbb2a;
      border-radius: 4px 4px 2px 2px;
      transform-origin: bottom center;
    }
    .blade:nth-child(odd)  { transform: rotate(-12deg); height: 25px; background: #5ed035; }
    .blade:nth-child(3n)   { transform: rotate(10deg);  height: 35px; background: #3ca518; }

    /* Fence */
    .fence {
      position: absolute;
      bottom: 75px;
      left: 0;
      width: 100%;
      display: flex;
      align-items: flex-end;
    }
    .fence-rail-top, .fence-rail-bot {
      position: absolute;
      left: 0;
      width: 100%;
      height: 14px;
      background: #f8f8f8;
      border: 2px solid #ddd;
      border-radius: 4px;
    }
    .fence-rail-top { bottom: 68px; }
    .fence-rail-bot { bottom: 30px; }

    .fence-post {
      width: 26px;
      min-width: 26px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 4px 4px 2px 2px;
      margin: 0 6px;
      position: relative;
      flex-shrink: 0;
    }
    .fence-post::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-bottom: 14px solid white;
    }

    /* Flowers — di depan pagar */
    .flower-row {
      position: absolute;
      bottom: 78px;
      left: 0;
      width: 100%;
      display: flex;
      gap: 0;
      align-items: flex-end;
      pointer-events: none;
      z-index: 3;
    }
    .flower {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      animation: flowerSway 3s ease-in-out infinite;
    }
    .flower:nth-child(even) { animation-delay: 0.6s; }
    .flower:nth-child(3n)   { animation-delay: 1.2s; }
    @keyframes flowerSway {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(4deg); }
    }

    .flower-head {
      font-size: 38px;
      line-height: 1;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
    }
    .flower-stem {
      width: 5px;
      background: #3a9e14;
      border-radius: 3px;
    }

    /* ===================== HALAMAN 2 - GURU ===================== */
    #page-guru {
      display: none;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #page-guru .page-title {
      font-size: 52px;
      font-weight: 900;
      color: white;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
      margin-bottom: 16px;
    }
    #page-guru .page-subtitle {
      font-size: 22px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 40px;
    }
    .back-btn {
      background: white;
      color: #3b3b9c;
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 800;
      padding: 12px 40px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #c0c0c0;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .back-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #b0b0b0; }
    .back-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #c0c0c0; }

    .page-icon { font-size: 90px; margin-bottom: 20px; animation: iconBounce 2s ease-in-out infinite; }

    /* ===================== HALAMAN 3 - MURID ===================== */
    #page-murid {
      display: none;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #page-murid .page-title {
      font-size: 52px;
      font-weight: 900;
      color: white;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
      margin-bottom: 16px;
    }
    #page-murid .page-subtitle {
      font-size: 22px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 40px;
    }


    /* ===================== HALAMAN PASSWORD ===================== */
    #page-password {
      display: none;
      height: 100vh;
      width: 100vw;
      background-color: #f5f0e4;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .splat { position: absolute; pointer-events: none; }
    .pw-logo {
      width: 360px; height: 360px; object-fit: contain;
      margin-bottom: 10px;
      animation: logoBounce 2.5s ease-in-out infinite;
      position: relative; z-index: 2;
    }
    .pw-wrap {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .pw-input-box {
      background: #2c2cb8; border: none; border-radius: 20px;
      padding: 20px 60px;
      font-family: "Nunito", sans-serif; font-size: 28px; font-weight: 800;
      color: white; width: 480px; text-align: center; outline: none;
      box-shadow: 0 7px 0 #1a1a88, 0 12px 24px rgba(44,44,184,0.35);
      letter-spacing: 4px; caret-color: #ffd700; transition: box-shadow 0.2s;
    }
    .pw-input-box::placeholder { color: rgba(255,255,255,0.7); letter-spacing: 1px; font-size: 26px; }
    .pw-input-box:focus { box-shadow: 0 7px 0 #1a1a88, 0 0 0 4px rgba(255,215,0,0.5), 0 12px 24px rgba(44,44,184,0.35); }
    .pw-error {
      font-size: 16px; font-weight: 800; color: #cc2200;
      background: rgba(255,255,255,0.85); padding: 6px 20px;
      border-radius: 20px; display: none; animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100%{ transform: translateX(0); } 25%{ transform: translateX(-10px); } 75%{ transform: translateX(10px); }
    }
    .pw-submit {
      background: #ffd700; color: #2c2cb8;
      font-family: "Nunito", sans-serif; font-size: 20px; font-weight: 900;
      padding: 12px 50px; border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 0 #c9a800; transition: transform 0.1s, box-shadow 0.1s; letter-spacing: 1px;
    }
    .pw-submit:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #c9a800; }
    .pw-submit:active { transform: translateY(3px);  box-shadow: 0 3px 0 #c9a800; }
    .pw-back {
      font-family: "Nunito", sans-serif; font-size: 16px; font-weight: 700;
      color: #555; background: none; border: none; cursor: pointer;
      text-decoration: underline;
      position: absolute; bottom: 24px; left: 30px; z-index: 10;
    }

    /* ===================== TRANSITION OVERLAY ===================== */
    #overlay {
      position: fixed;
      inset: 0;
      background: #2c2cb8;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #overlay.fade-in  { opacity: 1; pointer-events: all; }
    #overlay.fade-out { opacity: 0; pointer-events: none; }

    /* Sparkle stars on button click */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 998;
      font-size: 28px;
      animation: sparkleFly 0.7s ease-out forwards;
    }
    @keyframes sparkleFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* Stars background decoration */
    .star-deco {
      position: absolute;
      font-size: 22px;
      animation: twinkle 2.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>

  <!-- Input -->
  <div class="pw-wrap">
    <input class="pw-input-box" id="pwInput" type="password" placeholder="Password" maxlength="20"
      onkeydown="if(event.key==='Enter') checkPassword()" autocomplete="off"/>
    <div class="pw-error" id="pwError">❌ Password salah! Coba lagi.</div>
    <button class="pw-submit" onclick="checkPassword()">✔ Masuk</button>
  </div>
  <button class="pw-back" onclick="goBack()">← Kembali</button>
</div>

<!-- ========== HALAMAN GURU ========== -->
<div id="page-guru">
  <div class="star-deco" style="top:10%; left:8%; animation-delay:0s;">✨</div>
  <div class="star-deco" style="top:20%; right:12%; animation-delay:0.8s;">⭐</div>
  <div class="star-deco" style="bottom:25%; left:15%; animation-delay:1.4s;">🌟</div>
  <div class="page-icon">👩‍🏫</div>
  <div class="page-title">Halaman Guru</div>
  <div class="page-subtitle">Selamat datang, Guru! 🎉</div>
  <button class="back-btn" onclick="goBack()">⬅ Kembali</button>
</div>

<!-- ========== HALAMAN MURID ========== -->
<div id="page-murid">
  <div class="star-deco" style="top:10%; left:8%; animation-delay:0s;">🌸</div>
  <div class="star-deco" style="top:20%; right:12%; animation-delay:0.8s;">🌺</div>
  <div class="star-deco" style="bottom:25%; left:15%; animation-delay:1.4s;">🎀</div>
  <div class="page-icon">🧒</div>
  <div class="page-title">Halaman Murid</div>
  <div class="page-subtitle">Selamat belajar, Murid! 🎈</div>
  <button class="back-btn" onclick="goBack()">⬅ Kembali</button>
</div>

<script>
  /* ======= BUILD GARDEN ======= */
  (function buildGarden() {
    const screenW = window.innerWidth;

    // Fence posts
    const fence = document.getElementById('fenceEl');
    const postCount = Math.ceil(screenW / 38) + 2;
    for (let i = 0; i < postCount; i++) {
      const post = document.createElement('div');
      post.className = 'fence-post';
      post.style.height = (90 + Math.random() * 20) + 'px';
      fence.appendChild(post);
    }

    // Flowers
    const flowerRow = document.getElementById('flowerRow');
    const flowers   = ['🌻', '🌼', '🌸', '🌻', '🌼'];
    const gap       = 60;
    const count     = Math.ceil(screenW / gap) + 2;
    for (let i = 0; i < count; i++) {
      const f    = document.createElement('div');
      f.className = 'flower';
      f.style.marginLeft = (i === 0 ? -10 : Math.random() * 20 - 5) + 'px';
      const stemH = 45 + Math.floor(Math.random() * 30);
      f.innerHTML = `
        <div class="flower-head">${flowers[i % flowers.length]}</div>
        <div class="flower-stem" style="height:${stemH}px"></div>
      `;
      flowerRow.appendChild(f);
    }
  })();

  /* ======= NAVIGATION ======= */
  let current = 'menu';

  function goTo(page, event) {
    // Sparkle effect
    if (event) createSparkles(event.clientX, event.clientY);

    const overlay = document.getElementById('overlay');
    overlay.classList.add('fade-in');

    setTimeout(() => {
      document.getElementById('page-menu').style.display  = 'none';
      document.getElementById('page-guru').style.display  = 'none';
      document.getElementById('page-password').style.display = 'none';
      document.getElementById('page-murid').style.display = 'none';

      const target = document.getElementById('page-' + page);
      target.style.display = 'flex';
      current = page;

      overlay.classList.remove('fade-in');
      overlay.classList.add('fade-out');
      setTimeout(() => overlay.classList.remove('fade-out'), 400);
    }, 350);
  }

  function goBack() {
    goTo('menu', null);
    setTimeout(() => {
      document.getElementById('page-menu').style.display = 'flex';
    }, 10);
  }

  /* ======= SPARKLE ======= */
  function createSparkles(x, y) {
    const emojis = ['⭐', '✨', '🌟', '💫', '🎉', '🎊'];
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const angle = (Math.PI * 2 / 8) * i;
      const dist  = 60 + Math.random() * 60;
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 750);
    }
  }

  /* ======= PASSWORD CHECK ======= */
  const GURU_PASSWORD = 'ACH'; // <-- ganti password di sini

  function checkPassword() {
    const input = document.getElementById('pwInput');
    const errEl = document.getElementById('pwError');
    if (input.value === GURU_PASSWORD) {
      errEl.style.display = 'none';
      input.value = '';
      goTo('guru', null);
    } else {
      errEl.style.display = 'block';
      errEl.style.animation = 'none';
      void errEl.offsetWidth;
      errEl.style.animation = 'shake 0.4s ease';
      input.value = '';
      input.focus();
    }
  }

</script>

</body>
